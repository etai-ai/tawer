<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>TAWER — Tower Defense</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Records modal (outside game-wrapper for iOS position:fixed compatibility) -->
<div id="records-overlay">
  <div id="records-modal">
    <h2>RECORDS</h2>
    <div id="records-list"></div>
    <div id="records-actions">
      <button id="clear-records-btn">CLEAR ALL</button>
      <button id="close-records-btn">CLOSE</button>
    </div>
  </div>
</div>

<div id="game-wrapper">
  <div id="top-bar">
    <h1>TAWER</h1>
    <div id="world-info">
      <span class="world-name" id="world-name">SERPENT</span>
      <span class="level-num">LVL <span id="level">1</span></span>
    </div>
    <div id="hud">
      <div class="hud-row">
        <div class="hud-item"><span class="hud-label">GOLD</span><span class="hud-value gold" id="gold">300</span></div>
        <div class="hud-item"><span class="hud-label">LIVES</span><span class="hud-value lives" id="lives">10</span></div>
      </div>
      <div class="hud-row">
        <div class="hud-item"><span class="hud-label">WAVE</span><span class="hud-value wave-val" id="wave">0</span></div>
        <div class="hud-item"><span class="hud-label">SCORE</span><span class="hud-value score-val" id="score">0</span></div>
      </div>
    </div>
  </div>

  <div id="canvas-wrapper">
    <canvas id="game-canvas"></canvas>
    <div id="game-over-overlay">
      <div id="record-stars"></div>
      <h2 id="end-title">DEFEATED</h2>
      <div id="record-score"></div>
      <p id="end-msg" style="color:#556677;letter-spacing:2px;font-size:16px;"></p>
      <button id="restart-btn">RESTART</button>
    </div>
  </div>

  <div id="controls">
    <div id="tower-bar">
      <button class="tower-btn selected" data-type="gun">
        <canvas class="icon-canvas" width="44" height="44"></canvas>
        <span class="tname">GUN</span>
        <span class="cost">50g</span>
      </button>
      <button class="tower-btn" data-type="cannon">
        <canvas class="icon-canvas" width="44" height="44"></canvas>
        <span class="tname">CANNON</span>
        <span class="cost">100g</span>
      </button>
      <button class="tower-btn" data-type="sniper">
        <canvas class="icon-canvas" width="44" height="44"></canvas>
        <span class="tname">SNIPER</span>
        <span class="cost">150g</span>
      </button>
      <button class="tower-btn" data-type="frost">
        <canvas class="icon-canvas" width="44" height="44"></canvas>
        <span class="tname">FROST</span>
        <span class="cost">75g</span>
      </button>
    </div>
    <div id="action-row">
      <button id="start-btn">START</button>
      <button class="action-btn" id="speed-btn">1X</button>
      <button class="action-btn active" id="auto-btn">AUTO</button>
      <button class="action-btn active" id="sound-btn">🔊</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="engine.js"></script>
<script src="render.js"></script>
</body>
</html>
